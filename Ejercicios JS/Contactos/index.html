<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agenda de Contactos</title>
  <link rel="stylesheet" href="style.css">
  <meta name="Author" content="Santiago Rey">
</head>
<body>
  <header>
    <h1>Agenda Contactos</h1>
  </header>
  <main class="container">
    <section class="formulario">
      <form id="formulario">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="telefono" placeholder="Teléfono" required>
        <label>
          Favorito
          <input type="checkbox" id="favorito">
        </label>
        <button type="submit">Agregar</button>
      </form>
    </section>
    <section class="busqueda">
      <input type="text" id="buscar" placeholder="Buscar contacto">
      <button id="btnFavoritos">Mostrar favoritos</button>
    </section>
    <section id="estadisticas"></section>
    <section id="listaContactos"></section>
  </main>
  <script src="doc.js"></script>
</body>
</html>
